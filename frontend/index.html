<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PO Manager - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light fixed-top shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="index.html">PO Manager</a>
            <div id="navItems" style="display: none; width: 100%;">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center">
                    <li class="nav-item">
                        <a class="nav-link fw-semibold active text-primary" href="index.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-semibold" href="create-po.html">Create PO</a>
                    </li>
                    <li class="nav-item ms-lg-4">
                        <button class="btn btn-outline-danger btn-sm" onclick="logout()">Sign out</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container" style="margin-top: 100px;">
        <div id="authContainer" class="animate-fade-in text-center flex-column glass-card p-5 mx-auto shadow" style="max-width: 450px;">
            <div class="mb-4">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-primary mb-3"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                <h2 class="fw-bold">Welcome Back</h2>
                <p class="text-muted">Sign in to Purchase Order System</p>
            </div>
            
            <div id="googleSignInBtn" class="mx-auto mb-3"></div>
            
            <hr class="text-muted w-100 my-4">
            <button class="btn btn-sm btn-outline-secondary" onclick="window.mockLogin()">Bypass Login (Test Mode)</button>
        </div>

        <div id="appContent" class="animate-fade-in" style="display: none;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="fw-bold mb-1">Purchase Orders</h2>
                    <p class="text-muted mb-0">Manage and track all company POs</p>
                </div>
                <a href="create-po.html" class="btn btn-primary shadow-sm">+ Create New PO</a>
            </div>

            <div class="glass-card p-4">
                <div class="table-responsive">
                    <table class="table table-hover borderless">
                        <thead>
                            <tr>
                                <th>Reference No</th>
                                <th>Vendor</th>
                                <th>Total Amount</th>
                                <th>Status</th>
                                <th>Created Date</th>
                            </tr>
                        </thead>
                        <tbody id="poTableBody">
                            <tr>
                                <td colspan="5" class="text-center py-5 text-muted">
                                    <div class="spinner-border spinner-border-sm text-primary me-2" role="status"></div> Loading...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        function loadDashboard() {
            apiCall('/purchase-orders')
                .then(pos => {
                    const tbody = document.getElementById('poTableBody');
                    tbody.innerHTML = '';
                    
                    if (!pos || pos.length === 0) {
                        tbody.innerHTML = `<tr><td colspan="5" class="text-center py-5 text-muted"><h4>No Orders Found</h4><p>You haven't created any purchase orders yet.</p></td></tr>`;
                        return;
                    }
                    
                    // Sort by newest first
                    pos.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
                    
                    pos.forEach(po => {
                        const date = new Date(po.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
                        const vendorName = po.vendor ? po.vendor.name : 'Unknown';
                        
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td class="fw-semibold text-primary">#${po.reference_no}</td>
                            <td class="fw-medium">${vendorName}</td>
                            <td class="fw-bold text-success">$${po.total_amount.toFixed(2)}</td>
                            <td><span class="badge bg-secondary px-3 py-2 rounded-pill shadow-sm">${po.status}</span></td>
                            <td class="text-muted">${date}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                })
                .catch(err => {
                    document.getElementById('poTableBody').innerHTML = 
                        `<tr><td colspan="5" class="text-center py-4 text-danger fw-bold">Error loading data: STDOUT ${err.message}</td></tr>`;
                });
        }
    </script>
</body>
</html>
